<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMETHEUS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 16px 20px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ff6b35;
            letter-spacing: 2px;
        }
        header span {
            font-size: 0.75rem;
            color: #555;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .bot {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            align-self: flex-start;
            color: #ccc;
        }
        .user {
            background: #ff6b35;
            color: #fff;
            align-self: flex-end;
        }
        .quick-btns {
            padding: 10px 20px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            border-top: 1px solid #1a1a1a;
        }
        .quick-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #aaa;
            padding: 7px 14px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .quick-btn:hover { border-color: #ff6b35; color: #ff6b35; }
        #input-area {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #1a1a1a;
        }
        #msg-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
        }
        #msg-input:focus { border-color: #ff6b35; }
        #send-btn {
            background: #ff6b35;
            border: none;
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.2s;
        }
        #send-btn:hover { background: #e55a25; }
        #mic-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #aaa;
            width: 46px;
            height: 46px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        #mic-btn.listening { background: #c0392b; color: #fff; border-color: #c0392b; }
        .typing { color: #555; font-style: italic; font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <h1>⚡ PROMETHEUS</h1>
    <span>Личный ассистент Александра</span>
</header>

<div id="chat">
    <div class="msg bot">Система активна. Чем могу помочь, Александр?</div>
</div>

<div class="quick-btns">
    <button class="quick-btn" onclick="send('Что делать сейчас?')">⚡ Что делать?</button>
    <button class="quick-btn" onclick="send('Добавь задачу')">📋 Задача</button>
    <button class="quick-btn" onclick="send('Есть идея')">💡 Идея</button>
    <button class="quick-btn" onclick="send('Как мои цели?')">🎯 Цели</button>
    <button class="quick-btn" onclick="send('Сегодня устал')">😴 Состояние</button>
</div>

<div id="input-area">
    <button id="mic-btn" title="Голос">🎤</button>
    <input type="text" id="msg-input" placeholder="Напишите сообщение...">
    <button id="send-btn">➤</button>
</div>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('msg-input');
    const micBtn = document.getElementById('mic-btn');

    function addMsg(text, who) {
        const div = document.createElement('div');
        div.className = 'msg ' + who;
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    async function send(text) {
        text = text || input.value.trim();
        if (!text) return;
        input.value = '';
        addMsg(text, 'user');

        const typing = addMsg('...', 'bot typing');
        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, user: 'alexander' })
            });
            const data = await res.json();
            typing.remove();
            addMsg(data.output || data.text || data.message || 'Получено.', 'bot');
        } catch (e) {
            typing.remove();
            addMsg('Ошибка соединения.', 'bot');
        }
    }

    document.getElementById('send-btn').onclick = () => send();
    input.addEventListener('keypress', e => { if (e.key === 'Enter') send(); });

    // Голосовой ввод
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new SR();
        rec.lang = 'ru-RU';
        rec.interimResults = false;

        micBtn.onclick = () => {
            if (micBtn.classList.contains('listening')) { rec.stop(); return; }
            rec.start();
        };
        rec.onstart = () => { micBtn.classList.add('listening'); micBtn.textContent = '🔴'; };
        rec.onend = () => { micBtn.classList.remove('listening'); micBtn.textContent = '🎤'; };
        rec.onresult = e => { input.value = e.results[0][0].transcript; };
    } else {
        micBtn.style.display = 'none';
    }
</script>
</body>
</html>
